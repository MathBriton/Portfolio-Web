# Parâmetros do tema Hextra
# Docs: https://imfing.github.io/hextra/

[author]
  name = "Matheus Brito"
  email = "mathhbrito@gmail.com"

[navbar]
  displayTitle = true
  displayLogo = false

[footer]
  enable = true
  displayCopyright = false   # copyright renderizado em custom/footer.html (ano dinâmico)
  displayPoweredBy = false

[theme]
  # default | dark | light
  default = "system"
  displayToggle = true

[page]
  width = "normal"

[editURL]
  enable = false
