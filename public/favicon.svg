<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Matheus Brito">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <!-- base: rounded square escuro com anel ciano -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#0a0a0a"/>
  <rect x="3.25" y="3.25" width="57.5" height="57.5" rx="14.75" fill="none" stroke="url(#ring)" stroke-width="2.5"/>
  <!-- prompt do terminal: >_ (identidade do produto) -->
  <g fill="none" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20,22 32,32 20,42"/>
    <line x1="38" y1="44" x2="48" y2="44"/>
  </g>
</svg>
