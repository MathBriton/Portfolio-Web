server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compressão
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    application/xml text/xml image/svg+xml application/wasm;

    # Páginas HTML: sem cache agressivo (conteúdo pode mudar)
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Assets com fingerprint do Hugo: cache longo e imutável
    location ~* \.(css|js|woff2?|ttf|svg|png|jpg|jpeg|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Headers de segurança básicos
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    error_page 404 /404.html;
}
