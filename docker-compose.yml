# Ambiente local
#
#   Produção:   docker compose up --build web        → http://localhost:8080
#   Desenvolv.: docker compose --profile dev up dev   → http://localhost:5173
#
services:
  # Build estático (Vite) servido por Nginx — espelha a produção
  web:
    build:
      context: .
    image: portfolio-web:prod
    ports:
      - "8080:80"
    restart: unless-stopped

  # Servidor de desenvolvimento com HMR (opcional)
  dev:
    profiles: ["dev"]
    image: node:22-alpine
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
